services:
    backend:
        container_name: fastapi
        build:
            context: .
            dockerfile: backend/Dockerfile.cpu
        ports: [ '8000:8000' ]
        restart: unless-stopped
        env_file:
            - backend/.env
        environment:
            - CORS_ORIGINS=http://localhost:5173
        volumes:
            - ./backend:/app

    frontend:
        container_name: react
        build:
            context: .
            dockerfile: frontend/Dockerfile
            target: dev
        ports: [ '5173:5173' ]
        restart: unless-stopped
        environment:
            - VITE_API_BASE=/fastapi
            - VITE_PROXY_HOST=http://fastapi:8000
        depends_on: [ backend ]
        volumes:
            - ./frontend:/app
            - /app/node_modules

    # Optional GPU backend service — not started by default. To run,
    # use `docker compose --profile gpu up` (requires NVIDIA Container Toolkit).
    backend_gpu:
        container_name: fastapi-gpu
        profiles: [ gpu ]
        build:
            context: .
            dockerfile: backend/Dockerfile.gpu
        ports: [ '8000:8000' ]
        restart: unless-stopped
        env_file:
            - backend/.env
        environment:
            - CORS_ORIGINS=http://localhost:5173
        volumes:
            - ./backend:/app
